<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta · Noty</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1>Crear cuenta</h1>
            <p class="auth-subtitle">Regístrate para empezar a usar Noty</p>

            <div id="message" class="message"></div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre completo" required autocomplete="name" />
                    <small class="error-message" id="name-error"></small>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="email" />
                    <small class="error-message" id="email-error"></small>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" />
                    <small class="error-message" id="password-error"></small>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary">
                    <span id="btn-text">Registrarme</span>
                    <span id="btn-spinner" class="spinner" style="display: none"></span>
                </button>
            </form>

            <p class="auth-footer">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
