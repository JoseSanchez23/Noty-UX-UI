<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión · Noty</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Iniciar sesión</h1>
            <p class="auth-subtitle">Ingresa tus credenciales para continuar</p>

            <div id="message" class="message"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="email" />
                    <small class="error-message" id="email-error"></small>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required autocomplete="current-password" />
                    <small class="error-message" id="password-error"></small>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary">
                    <span id="btn-text">Entrar</span>
                    <span id="btn-spinner" class="spinner" style="display: none"></span>
                </button>
            </form>

            <p class="auth-footer">
                ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
