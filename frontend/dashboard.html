<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Noty</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
  <style>
    /* Estilos exclusivos de las mejoras UX del dashboard (Integrante 3). */
    .notes-controls { display: grid; gap: var(--space-sm); }
    .search-field { position: relative; }
    .search-field svg { position: absolute; left: 12px; top: 50%; width: 16px; height: 16px; color: var(--text-tertiary); transform: translateY(-50%); pointer-events: none; }
    .search-field input, .notes-filters select { width: 100%; min-height: 40px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface-hover); color: var(--text-primary); font: inherit; }
    .search-field input { padding: 0 12px 0 38px; }
    .search-field input:focus, .notes-filters select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    .notes-filters { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm); }
    .notes-filters select { padding: 0 8px; font-size: 12px; }
    .notes-count { margin: -4px 0 0; color: var(--text-tertiary); font-size: 12px; }
    .note-item-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .note-preview { overflow: hidden; color: var(--text-secondary); font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
    .favorite-indicator { color: var(--warning) !important; font-size: 15px !important; }
    .button.is-favorite { color: var(--warning); border-color: var(--warning); background: rgba(245,158,11,.08); }
    .button:disabled { opacity: .55; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .note-editor:empty::before { content: attr(data-placeholder); color: var(--text-placeholder); pointer-events: none; }
    @media (max-width: 768px) { .notes-filters { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="dashboard-page">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div>
          <p class="eyebrow">Notas</p>
          <h1>Noty</h1>
        </div>
        <button id="logoutButton" class="icon-button" type="button" title="Cerrar sesión" aria-label="Cerrar sesión">
          <i data-lucide="log-out" style="width:16px; height:16px;"></i>
        </button>
      </div>

      <button id="newNoteButton" class="button primary full-width" type="button" title="Crear una nota nueva">
        <i data-lucide="plus" style="width:16px; height:16px;"></i> Nueva nota
      </button>

      <div class="notes-controls" aria-label="Organización de notas">
        <label class="sr-only" for="notesSearch">Buscar notas</label>
        <div class="search-field">
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="notesSearch" type="search" placeholder="Buscar notas..." autocomplete="off">
        </div>

        <div class="notes-filters">
          <label class="sr-only" for="notesFilter">Filtrar notas</label>
          <select id="notesFilter" title="Filtrar notas">
            <option value="all">Todas</option>
            <option value="favorites">Favoritas</option>
          </select>

          <label class="sr-only" for="notesSort">Ordenar notas</label>
          <select id="notesSort" title="Ordenar notas">
            <option value="updated-desc">Más recientes</option>
            <option value="updated-asc">Más antiguas</option>
            <option value="title-asc">Título A-Z</option>
            <option value="title-desc">Título Z-A</option>
          </select>
        </div>
      </div>

      <p id="notesCount" class="notes-count" aria-live="polite"></p>
      <div id="notesList" class="notes-list" aria-label="Lista de notas"></div>
    </aside>

    <main class="editor-panel">
      <div class="editor-topbar">
        <input id="noteTitle" class="title-input" type="text" placeholder="Título de la nota" maxlength="120" aria-label="Título de la nota">
        <div class="editor-actions">
          <button id="favoriteNoteButton" class="button secondary" type="button" title="Marcar como favorita" aria-pressed="false">
            <i data-lucide="star" style="width:16px; height:16px;"></i> Favorita
          </button>
          <button id="saveNoteButton" class="button primary" type="button">
            <i data-lucide="save" style="width:16px; height:16px;"></i> Guardar
          </button>
          <button id="deleteNoteButton" class="button danger" type="button">
            <i data-lucide="trash-2" style="width:16px; height:16px;"></i> Eliminar
          </button>
          <button id="exportPdfButton" class="button secondary" type="button">
            <i data-lucide="file-down" style="width:16px; height:16px;"></i> Exportar PDF
          </button>
        </div>
      </div>

      <div class="toolbar" aria-label="Barra de formato">
        <button data-command="formatBlock" data-value="h1" type="button">H1</button>
        <button data-command="formatBlock" data-value="h2" type="button">H2</button>
        <button data-command="formatBlock" data-value="h3" type="button">H3</button>
        <button data-command="bold" type="button" title="Negrita"><i data-lucide="bold" style="width:16px; height:16px;"></i></button>
        <button data-command="italic" type="button" title="Cursiva"><i data-lucide="italic" style="width:16px; height:16px;"></i></button>
        <button data-command="insertUnorderedList" type="button"><i data-lucide="list" style="width:16px; height:16px;"></i> Lista</button>
        <button data-command="insertOrderedList" type="button"><i data-lucide="list-ordered" style="width:16px; height:16px;"></i> Lista</button>
        <button data-command="formatBlock" data-value="p" type="button">Párrafo</button>
      </div>

      <section id="noteEditor" class="note-editor" contenteditable="true" aria-label="Editor de contenido" data-placeholder="Escribe tu nota aquí..."></section>
      <p id="message" class="message" role="status" aria-live="polite">Cargando notas...</p>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/notes.js"></script>
</body>
</html>
